<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>ورشة علي حنش</title>
<style>
:root{
  color-scheme:dark;
  --bg:#050608;--panel:rgba(8,10,13,.76);--line:rgba(255,255,255,.11);
  --text:#f5f7fa;--muted:#8f97a3;--silver:#d7dce4;--red:#b91f34;--green:#2ad39a;
  --amber:#d6a54a;
}
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#030405;color:var(--text);font-family:Tahoma,Arial,sans-serif}
button{font:inherit}
.app{position:relative;width:100%;height:100%;overflow:hidden;background:
 radial-gradient(circle at 50% 12%,rgba(114,126,144,.16),transparent 36%),
 linear-gradient(#090c11,#040507 55%,#020304)}
.app:before{content:"";position:absolute;inset:0;pointer-events:none;background:
 linear-gradient(110deg,transparent 0 27%,rgba(255,255,255,.025) 31%,transparent 35% 100%),
 radial-gradient(circle at center,transparent 45%,rgba(0,0,0,.72) 100%)}
.noise{position:absolute;inset:-20%;pointer-events:none;opacity:.035;mix-blend-mode:screen;
 background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
 animation:grain .25s steps(2) infinite}
@keyframes grain{0%{transform:translate(0)}25%{transform:translate(2%,-1%)}50%{transform:translate(-1%,2%)}75%{transform:translate(1%,1%)}}
.topbar{position:absolute;z-index:30;top:18px;left:18px;right:18px;display:flex;align-items:center;justify-content:space-between;gap:14px}
.brand{display:flex;align-items:center;gap:13px;padding:11px 15px;border:1px solid var(--line);border-radius:18px;background:rgba(5,7,10,.68);backdrop-filter:blur(18px);box-shadow:0 18px 60px rgba(0,0,0,.35)}
.brand-mark{width:40px;height:40px;border-radius:13px;display:grid;place-items:center;background:
 linear-gradient(145deg,#f0f2f5,#777f8b);color:#050608;font-weight:1000;box-shadow:inset 0 0 0 1px rgba(255,255,255,.55)}
.brand small{display:block;color:#818996;font-size:9px;letter-spacing:.25em;font-weight:900}
.brand strong{display:block;margin-top:3px;font-size:17px}
.metrics{display:flex;gap:8px}
.metric{min-width:105px;padding:11px 14px;border:1px solid var(--line);border-radius:16px;background:rgba(5,7,10,.68);backdrop-filter:blur(18px)}
.metric span{display:block;color:#777f8b;font-size:9px;font-weight:800}
.metric b{display:block;margin-top:3px;font-size:14px}
.view{position:absolute;inset:0;display:none}
.view.active{display:block}
#hub{padding:105px 28px 24px}
.hub-head{text-align:center;position:relative;z-index:2}
.eyebrow{color:#8c95a2;font-size:10px;letter-spacing:.35em;font-weight:900}
.hub-head h1{margin:9px 0 5px;font-size:clamp(30px,4.2vw,62px);line-height:1;font-weight:1000;text-shadow:0 10px 45px rgba(0,0,0,.9)}
.hub-head p{margin:0;color:#a2a8b1;font-size:13px}
.garage-floor{position:absolute;inset:38% -8% -18%;transform:perspective(900px) rotateX(63deg);transform-origin:center top;background:
 linear-gradient(90deg,transparent 49.8%,rgba(255,255,255,.07) 50%,transparent 50.2%),
 repeating-linear-gradient(90deg,transparent 0 190px,rgba(255,255,255,.025) 191px 193px),
 repeating-linear-gradient(0deg,#090b0e 0 96px,#111419 98px 100px);border-top:1px solid rgba(255,255,255,.09)}
.bays{position:relative;z-index:3;margin:28px auto 0;max-width:1450px;height:calc(100vh - 225px);min-height:470px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:stretch}
.bay{position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.10);border-radius:26px;background:
 linear-gradient(180deg,rgba(31,35,42,.72),rgba(6,8,11,.94));box-shadow:0 30px 70px rgba(0,0,0,.36);cursor:pointer;transition:.35s cubic-bezier(.2,.8,.2,1);isolation:isolate}
.bay:hover{transform:translateY(-10px) scale(1.015);border-color:rgba(226,232,240,.32);box-shadow:0 42px 95px rgba(0,0,0,.56)}
.bay:before{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 20%,rgba(255,255,255,.07) 34%,transparent 48%);transform:translateX(-130%);transition:.7s}
.bay:hover:before{transform:translateX(130%)}
.bay-door{position:absolute;inset:0;background:
 repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0 28px,rgba(0,0,0,.10) 29px 31px);
 opacity:.65}
.bay-light{position:absolute;top:-18%;left:15%;right:15%;height:55%;background:radial-gradient(ellipse,rgba(220,226,235,.18),transparent 67%);filter:blur(10px)}
.bay-num{position:absolute;top:14px;left:15px;color:rgba(255,255,255,.18);font-size:11px;font-weight:900;letter-spacing:.16em}
.bay-visual{position:absolute;inset:14% 8% 24%;display:grid;place-items:center;filter:drop-shadow(0 24px 22px rgba(0,0,0,.6));transition:.35s}
.bay:hover .bay-visual{transform:scale(1.06) translateY(-4px)}
.bay-title{position:absolute;inset:auto 16px 18px;text-align:center}
.bay-title b{display:block;font-size:17px}
.bay-title span{display:block;margin-top:6px;color:#7f8792;font-size:10px}
.bay-score{position:absolute;top:14px;right:14px;display:flex;gap:3px;color:#4b515a;font-size:12px}
.bay-score .on{color:#d8dde4;text-shadow:0 0 18px rgba(255,255,255,.35)}
.station-svg{width:100%;height:100%;max-height:250px}
.launch-note{position:absolute;z-index:4;bottom:18px;left:50%;transform:translateX(-50%);padding:10px 15px;border:1px solid var(--line);border-radius:999px;background:rgba(4,5,7,.72);color:#8c949f;font-size:10px;font-weight:800;backdrop-filter:blur(16px)}
.game-shell{padding:94px 18px 18px}
.game-panel{position:relative;width:min(1320px,100%);height:calc(100vh - 112px);margin:auto;overflow:hidden;border:1px solid var(--line);border-radius:32px;background:
 radial-gradient(circle at 50% 0,rgba(141,151,166,.10),transparent 38%),#07090c;box-shadow:0 40px 110px rgba(0,0,0,.6)}
.game-head{position:absolute;z-index:8;top:0;left:0;right:0;height:72px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--line);background:rgba(5,7,10,.78);backdrop-filter:blur(15px)}
.game-head h2{margin:0;font-size:18px}
.game-head p{margin:4px 0 0;color:#808895;font-size:10px}
.back,.action{border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.04);color:#e7e9ed;padding:10px 14px;cursor:pointer;font-weight:900}
.back:hover,.action:hover{background:rgba(255,255,255,.08)}
.game-hud{display:flex;gap:8px}
.game-chip{padding:8px 11px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.03);font-size:11px;color:#9ca3ae}
.game-chip b{color:#fff}
.game-stage{position:absolute;inset:72px 0 0;overflow:hidden}
.task-tip{position:absolute;z-index:10;bottom:18px;left:50%;transform:translateX(-50%);padding:11px 18px;border:1px solid var(--line);border-radius:999px;background:rgba(4,5,7,.76);color:#d7dbe1;font-size:11px;font-weight:900;backdrop-filter:blur(16px);white-space:nowrap}
.result{position:absolute;z-index:50;inset:0;display:none;place-items:center;background:rgba(2,3,4,.78);backdrop-filter:blur(14px)}
.result.show{display:grid}
.result-card{width:min(430px,calc(100% - 30px));padding:32px;border:1px solid rgba(255,255,255,.14);border-radius:28px;background:linear-gradient(145deg,#12151a,#07090c);text-align:center;box-shadow:0 40px 100px rgba(0,0,0,.65)}
.result-badge{width:88px;height:88px;margin:auto;border-radius:50%;display:grid;place-items:center;border:1px solid rgba(255,255,255,.17);background:radial-gradient(circle,#2d333b,#0b0d11);font-size:32px}
.result h3{font-size:26px;margin:16px 0 8px}.result p{color:#929aa5;font-size:12px;line-height:1.8}.result-actions{display:flex;gap:10px;margin-top:20px}.result-actions button{flex:1}
.toast{position:fixed;z-index:90;left:50%;bottom:24px;transform:translate(-50%,12px);padding:12px 18px;border:1px solid var(--line);border-radius:999px;background:rgba(4,5,7,.85);font-size:11px;font-weight:900;opacity:0;transition:.22s;pointer-events:none;backdrop-filter:blur(15px)}
.toast.show{opacity:1;transform:translate(-50%,0)}
.drag{touch-action:none;user-select:none;cursor:grab}.drag:active{cursor:grabbing}

/* Battery — connect, diagnose, start */
.battery-scene{position:absolute;inset:0;background:
 radial-gradient(circle at 50% 38%,rgba(92,103,120,.17),transparent 38%),
 linear-gradient(180deg,#0b0e13,#050608)}
.battery-unit{position:absolute;left:42%;top:47%;width:min(470px,58vw);height:min(290px,39vh);transform:translate(-50%,-50%);border:10px solid #343a43;border-radius:42px;background:linear-gradient(145deg,#20252c,#090b0f);box-shadow:0 35px 75px rgba(0,0,0,.6),inset 0 0 0 3px rgba(255,255,255,.05)}
.battery-unit:after{content:"MSS POWER CELL";position:absolute;inset:40% 0 auto;text-align:center;color:#b9c0ca;font-size:clamp(12px,2vw,23px);font-weight:1000;letter-spacing:.18em}
.terminal{position:absolute;top:-38px;width:78px;height:78px;border-radius:50%;display:grid;place-items:center;font-size:34px;font-weight:1000;border:9px solid #08090b;box-shadow:0 10px 30px rgba(0,0,0,.6)}
.terminal.red{left:44px;background:#ad2438}.terminal.black{right:44px;background:#777f8b}
.clamp{position:absolute;width:122px;height:52px;border-radius:15px;background:linear-gradient(#c9ced6,#6b737e);border:5px solid #08090b;display:grid;place-items:center;color:#07090c;font-weight:1000;box-shadow:0 18px 35px rgba(0,0,0,.55);z-index:5}
.clamp.red{left:7%;bottom:12%;background:linear-gradient(#e64a5d,#7d1424);color:white}.clamp.black{left:25%;bottom:12%}
.clamp:after{content:"";position:absolute;width:185px;height:14px;top:15px;background:#16191e;z-index:-1}.clamp.red:after,.clamp.black:after{right:105px}
.clamp.locked{filter:drop-shadow(0 0 16px rgba(46,211,154,.65));pointer-events:none}.target-glow{box-shadow:0 0 0 8px rgba(255,255,255,.04),0 0 32px rgba(255,255,255,.15)}
.diagnostic-panel{position:absolute;right:4%;top:13%;width:min(350px,32vw);min-height:420px;padding:20px;border:1px solid rgba(255,255,255,.12);border-radius:28px;background:linear-gradient(145deg,rgba(29,34,42,.95),rgba(7,9,12,.97));box-shadow:0 30px 70px rgba(0,0,0,.55);opacity:.26;pointer-events:none;transform:translateX(18px);transition:.35s}
.diagnostic-panel.ready{opacity:1;pointer-events:auto;transform:none}.meter-label{font-size:9px;letter-spacing:.22em;color:#89929e;font-weight:1000}.meter-screen{margin:15px 0 14px;padding:21px 12px;border:5px solid #242a32;border-radius:18px;background:radial-gradient(circle at 50% 28%,#24352a,#07100a);color:#79f0a9;text-align:center;font:1000 clamp(29px,4vw,50px) monospace;text-shadow:0 0 18px rgba(81,240,143,.35)}
.meter-note{min-height:40px;color:#858e9a;font-size:10px;line-height:1.7;text-align:center}.diag-button,.ignition-button{width:100%;padding:13px;border:1px solid rgba(255,255,255,.13);border-radius:15px;background:linear-gradient(145deg,#343b45,#14181e);color:#eef1f5;font-weight:1000;cursor:pointer}.diag-button:hover,.ignition-button:hover{filter:brightness(1.15)}
.diagnosis-options{display:none;gap:8px;margin-top:12px}.diagnosis-options.show{display:grid}.diagnosis-option{padding:11px;border:1px solid rgba(255,255,255,.10);border-radius:13px;background:rgba(255,255,255,.035);color:#cfd4db;cursor:pointer;font-weight:900}.diagnosis-option:hover{background:rgba(255,255,255,.07)}.diagnosis-option.correct{border-color:rgba(42,211,154,.45);background:rgba(42,211,154,.10)}.diagnosis-option.wrong{border-color:rgba(220,38,56,.5);background:rgba(220,38,56,.10)}
.ignition-wrap{display:none;margin-top:13px}.ignition-wrap.show{display:block}.ignition-button{position:relative;overflow:hidden;background:linear-gradient(145deg,#9e1c31,#4a0c17)}.ignition-fill{position:absolute;inset:0 auto 0 0;width:0;background:rgba(255,255,255,.18);transition:width .08s linear}.ignition-button span{position:relative;z-index:2}.battery-spark{position:absolute;left:42%;top:47%;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 0 35px #fff,0 0 65px #7cf0b2;opacity:0;pointer-events:none}.battery-spark.on{animation:batteryFlash .7s ease}@keyframes batteryFlash{0%{opacity:0;transform:scale(.2)}35%{opacity:1;transform:scale(2)}100%{opacity:0;transform:scale(4)}}

/* Tire order — remove, configure, install, deliver */
.tire-scene{position:absolute;inset:0;background:radial-gradient(circle at 44% 48%,rgba(104,115,130,.15),transparent 36%),linear-gradient(180deg,#090c11,#050608)}
.customer-order{position:absolute;z-index:10;top:20px;right:20px;width:min(330px,31vw);padding:16px;border:1px solid rgba(255,255,255,.12);border-radius:21px;background:rgba(8,10,13,.86);box-shadow:0 22px 55px rgba(0,0,0,.45);backdrop-filter:blur(16px)}
.customer-head{display:flex;align-items:center;gap:11px}.customer-avatar{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(145deg,#d8dde4,#606976);color:#07090c;font-weight:1000}.customer-head small{display:block;color:#7f8793;font-size:9px}.customer-head b{font-size:13px}.customer-speech{margin:12px 0 10px;padding:11px;border-radius:13px;background:rgba(255,255,255,.04);color:#cfd4dc;font-size:11px;line-height:1.8}.order-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.order-spec{padding:9px;border:1px solid rgba(255,255,255,.08);border-radius:12px;background:rgba(255,255,255,.025)}.order-spec span{display:block;color:#747d89;font-size:8px}.order-spec b{display:block;margin-top:4px;font-size:11px}
.tire-workbench{position:absolute;inset:0}.wheel-assembly{position:absolute;left:42%;top:53%;width:min(500px,58vh);aspect-ratio:1;transform:translate(-50%,-50%);filter:drop-shadow(0 38px 45px rgba(0,0,0,.65));transition:.45s}.rim-visual{position:absolute;inset:0}.rim-svg{width:100%;height:100%;display:block}.wheel-assembly.selection{transform:translate(-50%,-50%) scale(.96)}
.nut{position:absolute;left:50%;top:50%;width:44px;height:44px;margin:-22px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#f1f3f6,#737b86 57%,#16191e 60%);border:5px solid #080a0d;box-shadow:0 7px 15px #000;transition:.35s;z-index:5}.nut.removed{opacity:0;transform:var(--nut-pos) scale(.2)!important;pointer-events:none}.nut.loose{background:radial-gradient(circle at 35% 30%,#d6b26d,#7d5421 57%,#17100a 60%)}.nut.done{background:radial-gradient(circle at 35% 30%,#80f0c7,#167657 58%,#0b251c 60%);box-shadow:0 0 24px rgba(42,211,154,.45)}
.nut-progress{position:absolute;inset:-10px;border-radius:50%;border:4px solid transparent;border-top-color:#e9edf3;opacity:0}.nut.working .nut-progress{opacity:1;animation:spin .6s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.impact{position:absolute;left:5%;bottom:10%;width:155px;height:82px;border-radius:24px 38px 20px 18px;background:linear-gradient(145deg,#cfd4dc,#5f6772);border:6px solid #090b0e;box-shadow:0 22px 38px rgba(0,0,0,.55);z-index:18}.impact:before{content:"";position:absolute;right:-58px;top:24px;width:70px;height:34px;border-radius:9px;background:#b8bec7;border:5px solid #090b0e}.impact:after{content:"";position:absolute;left:28px;bottom:-58px;width:54px;height:70px;border-radius:9px 9px 20px 20px;background:#8f192b;border:6px solid #090b0e}.impact-socket{position:absolute;right:-70px;top:31px;width:22px;height:22px;border-radius:50%;background:#e4e7eb;box-shadow:0 0 0 5px #171a1f}.impact.hidden{opacity:.18;pointer-events:none}
.rim-config{position:absolute;z-index:12;left:auto;right:3.5%;bottom:18px;width:min(375px,35vw);padding:17px;border:1px solid rgba(255,255,255,.12);border-radius:22px;background:rgba(8,10,13,.91);box-shadow:0 25px 65px rgba(0,0,0,.52);opacity:0;pointer-events:none;transform:translateY(18px);transition:.32s}.rim-config.show{opacity:1;pointer-events:auto;transform:none}.config-title{font-size:10px;color:#858e9a;font-weight:1000;letter-spacing:.17em}.rim-selector{display:grid;grid-template-columns:46px 1fr 46px;gap:8px;align-items:center;margin-top:12px}.arrow-btn{height:46px;border:1px solid rgba(255,255,255,.11);border-radius:13px;background:rgba(255,255,255,.04);color:#fff;font-size:19px;cursor:pointer}.rim-name{text-align:center;padding:13px;border-radius:13px;background:#10141a;font-weight:1000}.color-label{margin:14px 0 8px;color:#858e99;font-size:9px}.color-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}.color-swatch{aspect-ratio:1;border-radius:11px;border:3px solid #11151b;box-shadow:inset 0 0 0 1px rgba(255,255,255,.2);cursor:pointer}.color-swatch.selected{outline:3px solid #e7ebf0;outline-offset:2px;transform:scale(.9)}.install-rim{width:100%;margin-top:14px;padding:12px;border:1px solid rgba(255,255,255,.13);border-radius:14px;background:linear-gradient(145deg,#3d4550,#171b21);color:#fff;font-weight:1000;cursor:pointer}.deliver-btn{position:absolute;z-index:14;right:28px;bottom:24px;padding:14px 22px;border:1px solid rgba(255,255,255,.15);border-radius:16px;background:linear-gradient(145deg,#247d5e,#0d3d2d);color:#eafff6;font-weight:1000;cursor:pointer;display:none}.deliver-btn.show{display:block}.phase-badge{position:absolute;z-index:9;left:50%;top:20px;transform:translateX(-50%);padding:9px 14px;border:1px solid rgba(255,255,255,.10);border-radius:999px;background:rgba(4,5,7,.72);color:#b9c0c9;font-size:10px;font-weight:900}

/* Oil */
.oil-scene{position:absolute;inset:0;background:radial-gradient(circle at 50% 30%,rgba(103,113,128,.14),transparent 38%),#06080b}
.car-bottom{position:absolute;left:50%;top:25%;width:min(850px,86vw);height:210px;transform:translateX(-50%);border-radius:48px;background:linear-gradient(#272c33,#090b0e);border:8px solid #353b44;box-shadow:0 30px 60px rgba(0,0,0,.65)}
.oil-plug{position:absolute;left:50%;bottom:-22px;width:64px;height:44px;transform:translateX(-50%);border-radius:12px;background:linear-gradient(#e4e7eb,#646b75);border:6px solid #07090b;cursor:pointer}
.oil-stream{position:absolute;left:50%;top:calc(25% + 206px);width:14px;height:0;transform:translateX(-50%);background:linear-gradient(#6c3819,#1e0f08);border-radius:0 0 12px 12px;transition:height .25s}
.drain-pan{position:absolute;left:15%;bottom:14%;width:240px;height:90px;border-radius:20px 20px 60px 60px;background:linear-gradient(#4a515b,#101318);border:7px solid #080a0d;box-shadow:0 20px 40px rgba(0,0,0,.55);z-index:5}
.drain-pan:before{content:"";position:absolute;inset:20px 22px;background:#0b0d10;border-radius:50%;box-shadow:inset 0 0 25px #000}
.pan-target{position:absolute;left:50%;bottom:13%;width:250px;height:105px;transform:translateX(-50%);border:3px dashed rgba(220,225,232,.28);border-radius:28px}
.oil-bottle{position:absolute;right:10%;bottom:13%;width:92px;height:170px;border-radius:22px 22px 35px 35px;background:linear-gradient(90deg,#4a180e,#a4491c,#361008);border:6px solid #090b0d;display:none}
.oil-bottle:before{content:"";position:absolute;left:18px;right:18px;top:-38px;height:48px;border-radius:12px;background:#bcbfc4;border:5px solid #08090b}
.oil-gauge{position:absolute;right:8%;top:20%;width:64px;height:300px;border:5px solid #3b414a;border-radius:24px;background:#0a0c0f;display:none;overflow:hidden}
.oil-level{position:absolute;left:7px;right:7px;bottom:7px;height:0;background:linear-gradient(#b66d24,#5e2e0c);border-radius:14px;transition:height .1s}
.safe-band{position:absolute;left:0;right:0;bottom:68%;height:16%;border-top:2px solid rgba(42,211,154,.7);border-bottom:2px solid rgba(42,211,154,.7);background:rgba(42,211,154,.08)}

/* Belt */
.belt-scene{position:absolute;inset:0;background:radial-gradient(circle at 52% 45%,rgba(94,104,119,.16),transparent 40%),#06080b}
.pulley{position:absolute;width:130px;height:130px;border-radius:50%;background:radial-gradient(circle,#171b20 0 20%,#5a626d 22% 30%,#12151a 32% 59%,#07090b 61%);border:7px solid #303640;box-shadow:0 22px 45px rgba(0,0,0,.6)}
.pulley:after{content:"";position:absolute;inset:42%;border-radius:50%;background:#a7adb6}
.pulley.active{box-shadow:0 0 0 8px rgba(226,232,240,.06),0 0 35px rgba(226,232,240,.22)}
.pulley.hit{border-color:#2ad39a;box-shadow:0 0 30px rgba(42,211,154,.35)}
.belt-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.belt-handle{position:absolute;left:12%;bottom:12%;width:80px;height:80px;border-radius:50%;background:#14181d;border:12px solid #2e343d;box-shadow:0 18px 35px rgba(0,0,0,.6);z-index:6}



.result-joke{display:inline-block;margin-top:12px;padding:8px 11px;border:1px solid rgba(255,255,255,.09);border-radius:12px;background:rgba(255,255,255,.035);color:#c9ced5;font-weight:900}
.launch-note{transition:opacity .18s ease}

/* Missing letters — mixed categories and hints */
.letters-scene{position:absolute;inset:0;display:grid;place-items:center;padding:30px;background:radial-gradient(circle at 50% 16%,rgba(148,159,176,.14),transparent 34%),linear-gradient(180deg,#0a0d12,#050608)}
.letters-machine{position:relative;width:min(930px,95%);min-height:540px;padding:30px;border:1px solid rgba(255,255,255,.12);border-radius:31px;background:linear-gradient(145deg,rgba(29,33,40,.96),rgba(7,9,12,.98));box-shadow:0 38px 95px rgba(0,0,0,.66),inset 0 0 0 1px rgba(255,255,255,.03);overflow:hidden}
.letters-machine:before{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(115deg,transparent 0 31%,rgba(255,255,255,.045) 38%,transparent 46%),repeating-linear-gradient(0deg,transparent 0 35px,rgba(255,255,255,.012) 36px 37px)}
.letters-top{position:relative;display:flex;align-items:center;justify-content:space-between;gap:12px}.letters-tag{color:#8f98a5;font-size:10px;font-weight:1000;letter-spacing:.24em}.letters-round{padding:8px 12px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.035);font-size:11px;font-weight:900}
.letters-category{position:relative;width:max-content;max-width:100%;margin:22px auto 8px;padding:8px 14px;border:1px solid rgba(255,255,255,.10);border-radius:999px;background:rgba(255,255,255,.035);color:#d8dde4;font-size:11px;font-weight:1000}.letters-hint{position:relative;min-height:38px;margin:8px 0;text-align:center;color:#9098a4;font-size:11px;font-weight:800}.hint-reveal{position:relative;display:block;margin:0 auto 4px;padding:8px 12px;border:1px solid rgba(255,255,255,.11);border-radius:11px;background:rgba(255,255,255,.04);color:#cbd1d8;font-size:9px;font-weight:900;cursor:pointer}.hint-reveal:disabled{opacity:.45;cursor:default}
.word-slots{position:relative;direction:rtl;display:flex;justify-content:center;align-items:center;gap:8px;min-height:125px;flex-wrap:wrap;padding:15px}.letter-slot{width:55px;height:65px;display:grid;place-items:center;border:1px solid rgba(255,255,255,.12);border-radius:16px;background:linear-gradient(145deg,#171b21,#090b0e);box-shadow:inset 0 -8px 18px rgba(0,0,0,.28);font-size:28px;font-weight:1000;color:#eef1f5;transition:.22s}.letter-slot.blank{border:2px dashed rgba(220,225,232,.32);color:#8d96a3;background:#080a0d}.letter-slot.active{border-color:#dce1e7;box-shadow:0 0 0 7px rgba(226,232,240,.05),0 0 28px rgba(226,232,240,.18)}.letter-slot.space{width:20px;border:0;background:transparent;box-shadow:none}
.letters-bank{position:relative;display:flex;justify-content:center;gap:9px;flex-wrap:wrap;margin:10px auto 0;max-width:720px}.letter-choice{width:56px;height:54px;border:1px solid rgba(255,255,255,.12);border-radius:15px;background:linear-gradient(145deg,#313741,#101318);color:#f1f3f6;font-size:22px;font-weight:1000;cursor:pointer;transition:.18s;box-shadow:0 14px 25px rgba(0,0,0,.28)}.letter-choice:hover{transform:translateY(-5px);border-color:rgba(226,232,240,.35)}.letter-choice.wrong{animation:letterShake .28s ease;background:#761525;border-color:#e25b70}.letter-choice.correct{background:#167657;border-color:#5ce0b4;transform:scale(.92)}
@keyframes letterShake{25%{transform:translateX(-7px)}50%{transform:translateX(7px)}75%{transform:translateX(-4px)}}.letters-feedback{position:relative;min-height:28px;margin-top:16px;text-align:center;color:#a6aeb9;font-size:11px;font-weight:900}.letters-feedback.ok{color:#4ce0ae}.letters-feedback.bad{color:#f27889}.letters-lives{position:relative;display:flex;justify-content:center;gap:7px;margin-top:12px;color:#59616c;font-size:18px}.letters-lives .alive{color:#d8dde4}.letters-lives .lost{color:#7d1828}
@media(max-width:680px){.letters-scene{padding:8px}.letters-machine{min-height:0;padding:16px;border-radius:22px}.letter-slot{width:40px;height:50px;font-size:21px;border-radius:12px}.word-slots{gap:6px;padding:8px}.letter-choice{width:45px;height:45px;font-size:19px}.letters-bank{gap:7px}.letters-category{margin-top:14px}}

/* Quiz */
.quiz-scene{position:absolute;inset:0;display:grid;place-items:center;padding:32px;background:
 radial-gradient(circle at 50% 16%,rgba(154,165,181,.13),transparent 33%),
 linear-gradient(180deg,#0a0d12,#050608)}
.quiz-terminal{position:relative;width:min(850px,94%);min-height:500px;padding:28px;border:1px solid rgba(255,255,255,.12);border-radius:30px;background:
 linear-gradient(145deg,rgba(27,31,38,.94),rgba(7,9,12,.98));box-shadow:0 38px 95px rgba(0,0,0,.64),inset 0 0 0 1px rgba(255,255,255,.03);overflow:hidden}
.quiz-terminal:before{content:"";position:absolute;inset:0;pointer-events:none;background:
 linear-gradient(115deg,transparent 0 32%,rgba(255,255,255,.045) 38%,transparent 45%),
 repeating-linear-gradient(0deg,transparent 0 34px,rgba(255,255,255,.012) 35px 36px)}
.quiz-top{position:relative;display:flex;align-items:center;justify-content:space-between;gap:14px}
.quiz-label{color:#8e97a4;font-size:10px;font-weight:900;letter-spacing:.24em}
.quiz-counter{padding:8px 12px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.035);color:#d9dde3;font-size:11px;font-weight:900}
.quiz-progress{position:relative;height:8px;margin:19px 0 28px;border-radius:999px;background:#0b0e12;overflow:hidden;border:1px solid rgba(255,255,255,.07)}
.quiz-progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,#69727e,#e4e8ed);border-radius:inherit;transition:width .35s ease}
.quiz-question{position:relative;min-height:106px;margin:0;color:#f5f7fa;font-size:clamp(20px,2.5vw,31px);line-height:1.75;font-weight:1000}
.quiz-options{position:relative;display:grid;gap:11px;margin-top:20px}
.quiz-option{display:flex;align-items:center;gap:13px;width:100%;padding:15px 17px;border:1px solid rgba(255,255,255,.10);border-radius:17px;background:rgba(255,255,255,.035);color:#d7dce3;text-align:right;cursor:pointer;transition:.2s}
.quiz-option:hover{transform:translateX(-5px);border-color:rgba(226,232,240,.28);background:rgba(255,255,255,.065)}
.quiz-option:disabled{cursor:default;transform:none}
.quiz-option .letter{width:36px;height:36px;flex:0 0 36px;display:grid;place-items:center;border-radius:11px;background:#12161c;border:1px solid rgba(255,255,255,.10);font-weight:1000;color:#aab2bd}
.quiz-option.correct{border-color:rgba(42,211,154,.45);background:rgba(42,211,154,.10);color:#d8fff0}
.quiz-option.correct .letter{background:#1f9f76;color:#fff}
.quiz-option.wrong{border-color:rgba(185,31,52,.50);background:rgba(185,31,52,.11);color:#ffdfe4}
.quiz-option.wrong .letter{background:#a91f35;color:#fff}
.quiz-bottom{position:relative;display:flex;align-items:center;justify-content:space-between;margin-top:22px;color:#7f8792;font-size:10px;font-weight:800}
.quiz-streak{display:flex;align-items:center;gap:8px}.quiz-streak b{color:#e2e6eb}
.quiz-time{width:150px;height:6px;border-radius:999px;background:#0a0c0f;overflow:hidden}
.quiz-time span{display:block;width:100%;height:100%;background:linear-gradient(90deg,#b91f34,#d6a54a,#dfe3e8);transform-origin:right;transition:transform .1s linear}
.quiz-feedback{min-height:25px;margin-top:14px;text-align:center;color:#a7afb9;font-size:11px;font-weight:900}
.quiz-feedback.ok{color:#4ce0ae}.quiz-feedback.bad{color:#f06b7e}
@media(max-width:680px){
 .quiz-scene{padding:10px}.quiz-terminal{min-height:0;padding:18px;border-radius:22px}.quiz-question{font-size:18px;min-height:90px}.quiz-option{padding:12px}.quiz-bottom{gap:8px}.quiz-time{width:95px}
}

/* Tow */
.tow-scene{position:absolute;inset:0;background:#080a0e}
#towCanvas{width:100%;height:100%;display:block;touch-action:none}
.mobile-controls{position:absolute;z-index:9;left:18px;bottom:18px;display:none;grid-template-columns:repeat(3,54px);grid-template-rows:repeat(2,54px);gap:7px}
.mobile-controls button{border:1px solid var(--line);border-radius:15px;background:rgba(5,7,10,.74);color:white;font-size:18px}
.mobile-controls .up{grid-column:2}.mobile-controls .left{grid-column:1;grid-row:2}.mobile-controls .down{grid-column:2;grid-row:2}.mobile-controls .right{grid-column:3;grid-row:2}

@media(max-width:1050px){
 .bays{grid-template-columns:repeat(3,1fr);height:calc(100vh - 205px);overflow:auto;padding-bottom:70px}
 .bay{min-height:300px}.metrics .metric:nth-child(2){display:none}
}
@media(max-width:680px){
 .topbar{top:9px;left:9px;right:9px}.brand{padding:8px 10px}.brand-mark{width:34px;height:34px}.brand strong{font-size:14px}
 .metrics{display:none}#hub{padding:82px 10px 12px}.hub-head p{font-size:11px}.bays{grid-template-columns:1fr 1fr;gap:9px;margin-top:17px;height:calc(100vh - 165px)}
 .bay{min-height:225px;border-radius:20px}.bay-title b{font-size:13px}.bay-title span{display:none}.bay-visual{inset:12% 6% 25%}
 .game-shell{padding:75px 6px 6px}.game-panel{height:calc(100vh - 81px);border-radius:22px}.game-head{height:62px;padding:0 9px}.game-stage{inset:62px 0 0}
 .game-head p{display:none}.game-head h2{font-size:14px}.game-hud .game-chip:nth-child(2){display:none}.task-tip{font-size:9px;max-width:92%;white-space:normal;text-align:center}
 .battery-unit{width:78vw;height:34vh}.clamp{width:95px}.impact{transform:scale(.75);transform-origin:left bottom}.wheel{width:min(400px,76vw)}
 .car-bottom{width:94vw;height:170px}.oil-stream{top:calc(25% + 166px)}.drain-pan{transform:scale(.78);transform-origin:left bottom}.oil-bottle{transform:scale(.78);transform-origin:right bottom}
 .mobile-controls{display:grid}
 .battery-unit{left:50%;top:37%;width:78vw;height:28vh}.diagnostic-panel{right:4%;left:4%;top:auto;bottom:5%;width:auto;min-height:0;padding:13px}.meter-screen{margin:8px 0;padding:10px}.diagnosis-options{grid-template-columns:repeat(3,1fr)}.diagnosis-option{font-size:9px;padding:8px}.clamp.red{left:4%;bottom:35%}.clamp.black{left:28%;bottom:35%}
 .customer-order{top:8px;right:8px;width:calc(100% - 16px);padding:9px}.customer-speech{display:none}.order-grid{grid-template-columns:1fr 1fr}.wheel-assembly{left:50%;top:53%;width:min(390px,63vh)}.rim-config{left:7px;right:7px;bottom:7px;width:auto;padding:10px}.color-grid{grid-template-columns:repeat(7,1fr)}.impact{transform:scale(.7);transform-origin:left bottom}.phase-badge{top:120px}.deliver-btn{right:12px;bottom:12px}
}

<body>
<div class="app">
  <div class="noise"></div>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">AH</div>
      <div><small>MECHANIC SECTOR</small><strong>ورشة علي حنش</strong></div>
    </div>
    <div class="metrics">
      <div class="metric"><span>التحديات المنجزة</span><b id="doneCount">0 من 6</b></div>
      <div class="metric"><span>مجموع النجوم</span><b id="totalStars">0 ★</b></div>
    </div>
  </header>

  <section id="hub" class="view active">
    <div class="garage-floor"></div>
    <div class="hub-head">
      <div class="eyebrow">اختر بوابة العمل</div>
      <h1>ورشة علي حنش</h1>
      <p>ست تحديات داخل ورشة واحدة — وأي تخبيص مسؤوليتك أمام علي حنش</p>
    </div>
    <div class="bays" id="bays"></div>
    <div class="launch-note" id="funnyLine">أفضل نتيجة تُحفظ تلقائيًا — وسمعة الفني لا تُحفظ</div>
  </section>

  <section id="game" class="view game-shell">
    <div class="game-panel">
      <div class="game-head">
        <button class="back" id="backBtn">العودة للورشة</button>
        <div><h2 id="gameTitle">التحدي</h2><p id="gameSub">نفّذ المهمة بأعلى دقة</p></div>
        <div class="game-hud">
          <div class="game-chip">الوقت <b id="timer">00:00</b></div>
          <div class="game-chip">الأخطاء <b id="mistakes">0</b></div>
        </div>
      </div>
      <div class="game-stage" id="gameStage"></div>
      <div class="task-tip" id="taskTip"></div>
      <div class="result" id="result">
        <div class="result-card">
          <div class="result-badge" id="resultBadge">✓</div>
          <h3 id="resultTitle">تمت المهمة</h3>
          <p id="resultText"></p>
          <div class="result-actions">
            <button class="action" id="retryBtn">إعادة التحدي</button>
            <button class="action" id="hubBtn">العودة للورشة</button>
          </div>
        </div>
      </div>
    </div>
  </section>
  <div class="toast" id="toast"></div>
</div>

<script>
(() => {
'use strict';

const $ = s => document.querySelector(s);
const hub = $('#hub'), gameView = $('#game'), bays = $('#bays'), stage = $('#gameStage');
const timerEl = $('#timer'), mistakesEl = $('#mistakes'), taskTip = $('#taskTip');
const result = $('#result'), resultTitle = $('#resultTitle'), resultText = $('#resultText'), resultBadge = $('#resultBadge');
const toast = $('#toast');
const FUNNY_LINES = [
  'تنبيه: علي حنش يراقب من خلف الكراج، لا تسوي نفسك ما شفته',
  'الصامولة الضايعة تُخصم من كرامة الفني، مو من المخزون',
  'إذا سمعت صوت غريب… طف السيارة قبل ما تقول طبيعي',
  'الورشة غير مسؤولة عن الثقة الزايدة بعد أول ثلاث نجوم',
  'ممنوع التجارب العلمية على مركبات المواطنين',
  'علي حنش يقول: الشغل النظيف ما يحتاج تبرير طويل',
  'الزبون طلب وردي… لا تدخلنا في نقاش الذوق العام',
  'فحص الجودة عندنا: علي حنش يطالعك خمس ثواني ويسكت',
  'أي جنط يطير بعد التسليم تعتبره الورشة تحديثًا هوائيًا',
  'ممنوع تقول هذا الصوت طبيعي إلا ومعك شاهدين'
];
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const dist = (a,b)=>Math.hypot(a.x-b.x,a.y-b.y);

const GAMES = [
  {id:'battery',title:'إنعاش البطارية',sub:'وصل، افحص الجهد، وشغّل المركبة',num:'BAY 01',icon:'battery'},
  {id:'tire',title:'طلب الجنوط',sub:'نفّذ طلب الزبون من الفك إلى التسليم',num:'BAY 02',icon:'tire'},
  {id:'oil',title:'خدمة الزيت',sub:'صفِّ الزيت وعبّئ المستوى الآمن',num:'BAY 03',icon:'oil'},
  {id:'belt',title:'تركيب السير',sub:'مرر السير على البكرات',num:'BAY 04',icon:'belt'},
  {id:'quiz',title:'اختبار الفني المحترف',sub:'سيناريوهات دقيقة وإجابات متقاربة',num:'BAY 05',icon:'quiz'},
  {id:'letters',title:'مختبر الحروف',sub:'دول ومدن وميكانيك وأدوات مع تلميحات',num:'BAY 06',icon:'letters'}
];

let scores = JSON.parse(localStorage.getItem('aliHanishWorkshopScores') || '{}');
let current = null, seconds = 0, mistakes = 0, timerId = null, cleanup = ()=>{};
let toastTimer;

function iconSVG(kind){
  if(kind==='battery') return `<svg class="station-svg" viewBox="0 0 240 220"><defs><linearGradient id="m" x2="1" y2="1"><stop stop-color="#59626e"/><stop offset="1" stop-color="#101319"/></linearGradient></defs><rect x="34" y="60" width="172" height="118" rx="22" fill="url(#m)" stroke="#9ba3ad" stroke-width="5"/><rect x="53" y="85" width="134" height="62" rx="13" fill="#090b0e"/><circle cx="72" cy="54" r="22" fill="#a82034" stroke="#08090b" stroke-width="8"/><circle cx="168" cy="54" r="22" fill="#717984" stroke="#08090b" stroke-width="8"/><path d="M65 54h14M72 47v14M161 54h14" stroke="#fff" stroke-width="5" stroke-linecap="round"/><text x="120" y="123" fill="#dfe3e8" font-size="20" text-anchor="middle" font-weight="900">MSS</text></svg>`;
  if(kind==='tire') return `<svg class="station-svg" viewBox="0 0 240 220"><circle cx="120" cy="110" r="88" fill="#07090b" stroke="#2c3139" stroke-width="20"/><circle cx="120" cy="110" r="55" fill="#4e5661" stroke="#111419" stroke-width="12"/><circle cx="120" cy="110" r="20" fill="#101318"/><g fill="#d8dde4">${[0,72,144,216,288].map(a=>`<circle cx="${120+34*Math.cos(a*Math.PI/180)}" cy="${110+34*Math.sin(a*Math.PI/180)}" r="8"/>`).join('')}</g><path d="M178 42l18 18-66 66-21 4 4-21z" fill="#aeb5bf" stroke="#08090b" stroke-width="6"/></svg>`;
  if(kind==='oil') return `<svg class="station-svg" viewBox="0 0 240 220"><path d="M86 42h68l16 27v105c0 15-12 27-27 27H97c-15 0-27-12-27-27V69z" fill="#35130b" stroke="#89919c" stroke-width="6"/><path d="M101 26h38v28h-38z" fill="#bfc5cd" stroke="#08090b" stroke-width="6"/><path d="M89 88h62v60H89z" rx="10" fill="#8b3717"/><path d="M119 97c18 23 22 31 22 41a22 22 0 1 1-44 0c0-10 5-20 22-41z" fill="#d48731"/></svg>`;
  if(kind==='belt') return `<svg class="station-svg" viewBox="0 0 240 220"><path d="M55 65C86 20 161 22 190 73s9 106-36 125-105 1-123-48S25 108 55 65z" fill="none" stroke="#181c21" stroke-width="22"/><g fill="#111419" stroke="#7b838e" stroke-width="7"><circle cx="70" cy="74" r="31"/><circle cx="165" cy="65" r="26"/><circle cx="177" cy="154" r="34"/><circle cx="77" cy="164" r="24"/></g><g fill="#aab1ba"><circle cx="70" cy="74" r="8"/><circle cx="165" cy="65" r="7"/><circle cx="177" cy="154" r="9"/><circle cx="77" cy="164" r="7"/></g></svg>`;
  if(kind==='quiz') return `<svg class="station-svg" viewBox="0 0 260 220">
    <defs><linearGradient id="qg" x2="1" y2="1"><stop stop-color="#454d59"/><stop offset="1" stop-color="#11151b"/></linearGradient></defs>
    <rect x="34" y="28" width="192" height="150" rx="24" fill="url(#qg)" stroke="#929aa5" stroke-width="6"/>
    <rect x="52" y="47" width="156" height="96" rx="14" fill="#07090d" stroke="#343a43" stroke-width="4"/>
    <circle cx="130" cy="93" r="32" fill="#171b21" stroke="#b6bdc7" stroke-width="5"/>
    <text x="130" y="106" fill="#eef1f5" font-size="39" text-anchor="middle" font-weight="900">؟</text>
    <rect x="76" y="160" width="108" height="18" rx="9" fill="#222831"/>
    <circle cx="70" cy="187" r="8" fill="#2ad39a"/><circle cx="96" cy="187" r="8" fill="#d6a54a"/><circle cx="122" cy="187" r="8" fill="#b91f34"/>
  </svg>`;
  return `<svg class="station-svg" viewBox="0 0 260 220">
    <defs><linearGradient id="lg" x2="1" y2="1"><stop stop-color="#4d5662"/><stop offset="1" stop-color="#101319"/></linearGradient></defs>
    <rect x="28" y="33" width="204" height="150" rx="28" fill="url(#lg)" stroke="#929aa5" stroke-width="6"/>
    <rect x="48" y="55" width="42" height="52" rx="12" fill="#0a0d11" stroke="#4b535e" stroke-width="4"/>
    <rect x="109" y="55" width="42" height="52" rx="12" fill="#0a0d11" stroke="#dce1e7" stroke-width="4" stroke-dasharray="7 6"/>
    <rect x="170" y="55" width="42" height="52" rx="12" fill="#0a0d11" stroke="#4b535e" stroke-width="4"/>
    <text x="69" y="91" fill="#eef1f5" font-size="27" text-anchor="middle" font-weight="900">ح</text>
    <text x="130" y="91" fill="#aeb6c1" font-size="27" text-anchor="middle" font-weight="900">؟</text>
    <text x="191" y="91" fill="#eef1f5" font-size="27" text-anchor="middle" font-weight="900">ف</text>
    <g fill="#171b21" stroke="#69727e" stroke-width="3"><rect x="54" y="132" width="42" height="31" rx="9"/><rect x="109" y="132" width="42" height="31" rx="9"/><rect x="164" y="132" width="42" height="31" rx="9"/></g>
    <text x="75" y="154" fill="#dfe3e8" font-size="17" text-anchor="middle">ر</text><text x="130" y="154" fill="#dfe3e8" font-size="17" text-anchor="middle">و</text><text x="185" y="154" fill="#dfe3e8" font-size="17" text-anchor="middle">ن</text>
  </svg>`;
}

function renderBays(){
  bays.innerHTML = GAMES.map(g=>{
    const s=scores[g.id]?.stars||0;
    return `<button class="bay" data-game="${g.id}">
      <span class="bay-door"></span><span class="bay-light"></span><span class="bay-num">${g.num}</span>
      <span class="bay-score">${[1,2,3].map(n=>`<span class="${n<=s?'on':''}">★</span>`).join('')}</span>
      <span class="bay-visual">${iconSVG(g.icon)}</span>
      <span class="bay-title"><b>${g.title}</b><span>${g.sub}</span></span>
    </button>`;
  }).join('');
  bays.querySelectorAll('.bay').forEach(b=>b.onclick=()=>startGame(b.dataset.game));
  updateMetrics();
}

function updateMetrics(){
  const done=GAMES.filter(g=>scores[g.id]).length;
  const stars=GAMES.reduce((a,g)=>a+(scores[g.id]?.stars||0),0);
  $('#doneCount').textContent=`${done} من ${GAMES.length}`;
  $('#totalStars').textContent=`${stars} ★`;
}
function showToast(text){toast.textContent=text;toast.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>toast.classList.remove('show'),1400)}

function makeDraggable(el, area, onMove, onUp){
  let active=false,offX=0,offY=0;
  const down=e=>{active=true;const r=el.getBoundingClientRect();offX=e.clientX-r.left;offY=e.clientY-r.top;el.setPointerCapture(e.pointerId);e.preventDefault()};
  const move=e=>{if(!active)return;const ar=area.getBoundingClientRect();const x=clamp(e.clientX-ar.left-offX,0,ar.width-el.offsetWidth);const y=clamp(e.clientY-ar.top-offY,0,ar.height-el.offsetHeight);el.style.left=x+'px';el.style.top=y+'px';el.style.right='auto';el.style.bottom='auto';onMove?.(e,x,y)};
  const up=e=>{if(!active)return;active=false;try{el.releasePointerCapture(e.pointerId)}catch{}onUp?.(e)};
  el.addEventListener('pointerdown',down);el.addEventListener('pointermove',move);el.addEventListener('pointerup',up);el.addEventListener('pointercancel',up);
  return ()=>{el.removeEventListener('pointerdown',down);el.removeEventListener('pointermove',move);el.removeEventListener('pointerup',up);el.removeEventListener('pointercancel',up)};
}
function centers(a,b){const A=a.getBoundingClientRect(),B=b.getBoundingClientRect();return Math.hypot(A.left+A.width/2-(B.left+B.width/2),A.top+A.height/2-(B.top+B.height/2))}

      </div>
      <div class="ignition-wrap" id="ignitionWrap">

    </aside>

  setTask('وصل المشبكين بالأقطاب الصحيحة');

  let connected=0,scanned=false,diagnosed=false,scanTimer=null,holdTimer=null,progress=0;

        if(connected===2){panel.classList.add('ready');setTask('اضغط فحص الجهد ثم اختر التشخيص الصحيح')}
      }else{
        const wrong=stage.querySelector(`[data-target="${color==='red'?'black':'red'}"]`);
        if(centers(c,wrong)<82)addMistake('عكست الأقطاب… علي حنش فصل الكهرباء عنك');
        showToast('قرّب المشبك من القطب المطابق');
      }

  });

  scan.onclick=()=>{
    if(connected<2||scanned)return;
    scanned=true;scan.disabled=true;let n=0;

    scanTimer=setInterval(()=>{n++;screen.textContent=(8+Math.random()*8).toFixed(1)+' V';if(n>13){clearInterval(scanTimer);screen.textContent=scenario.voltage+' V';note.textContent='اختر التشخيص المطابق للقراءة';options.classList.add('show')}},70);
  };

      result.classList.add('show');return;
    }
    locked=false;left=18;feedback.textContent='';feedback.className='quiz-feedback';const item=questions[index];counter.textContent=`${index+1} / ${questions.length}`;progress.style.width=`${index/questions.length*100}%`;qEl.textContent=item.q;opts.innerHTML=item.a.map((answer,i)=>`<button class="quiz-option" data-i="${i}"><span class="letter">${['أ','ب','ج'][i]}</span><span>${answer}</span></button>`).join('');opts.querySelectorAll('.quiz-option').forEach(btn=>btn.onclick=()=>answer(Number(btn.dataset.i)));timeBar.style.transform='scaleX(1)';
    tick=setInterval(()=>{left-=.1;timeBar.style.transform=`scaleX(${Math.max(0,left/18)})`;if(left<=0){clearInterval(tick);locked=true;mistakes++;mistakesEl.textContent=mistakes;streak=0;streakEl.textContent='0×';feedback.textContent='انتهى الوقت — علي حنش اعتبر السكوت إجابة غلط';feedback.className='quiz-feedback bad';opts.querySelectorAll('button').forEach((b,i)=>{b.disabled=true;if(i===item.c)b.classList.add('correct')});setTimeout(()=>{index++;next()},1100)}},100);
  }
  function answer(choice){
    if(locked)return;locked=true;clearInterval(tick);const item=questions[index],buttons=[...opts.querySelectorAll('.quiz-option')];buttons.forEach(b=>b.disabled=true);buttons[item.c].classList.add('correct');
    if(choice===item.c){correct++;streak++;correctEl.textContent=correct;streakEl.textContent=`${streak}×`;feedback.textContent=streak>=3?`إجابة دقيقة — ${streak} متتالية، لا تغتر`:'إجابة صحيحة ودقيقة';feedback.className='quiz-feedback ok'}
    else{buttons[choice].classList.add('wrong');mistakes++;mistakesEl.textContent=mistakes;streak=0;streakEl.textContent='0×';feedback.textContent='الإجابة غير دقيقة — ظهرت الإجابة المعتمدة';feedback.className='quiz-feedback bad'}
    progress.style.width=`${(index+1)/questions.length*100}%`;setTimeout(()=>{index++;next()},1050);
  }
  next();cleanup=()=>clearInterval(tick);
}

renderBays();
const funnyLine = $('#funnyLine');
let funnyLineIndex = 0;
setInterval(()=>{
  if(!funnyLine) return;
  funnyLineIndex=(funnyLineIndex+1)%FUNNY_LINES.length;
  funnyLine.style.opacity='0';
  setTimeout(()=>{funnyLine.textContent=FUNNY_LINES[funnyLineIndex];funnyLine.style.opacity='1'},180);
},4200);
})();
</script>
